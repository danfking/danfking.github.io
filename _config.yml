title: Daniel King
description: Full-stack engineer orchestrating teams of people and agents. Writing about agentic development, developer tools, and MCP. Australia.
url: "https://danfking.github.io"
baseurl: ""

theme: minima

author:
  name: Daniel King

minima:
  social_links:
    - { platform: github, user_url: "https://github.com/danfking" }
    - { platform: devto, user_url: "https://dev.to/danfking" }

header_pages:
  - _pages/projects.md
  - _pages/about.md

defaults:
  - scope:
      path: "_pages"
    values:
      layout: page

permalink: /blog/:year/:month/:day/:title/

include:
  - _pages

plugins:
  - jekyll-feed
  - jekyll-seo-tag
